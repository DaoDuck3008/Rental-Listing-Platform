name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push-dockers:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Cấp quyền cho action để có thể upload Image lên Github Registry
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Docker requires the username/repository to be strictly lowercase
      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/rental-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/rental-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/rental-backend:buildcache,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/rental-frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/rental-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/rental-frontend:buildcache,mode=max

  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push-dockers
    if: github.event_name == 'push'
    steps:
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Lấy tên repo owner viết thường (do docker không nhận ký tự in hoa)
            export OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            
            # Đăng nhập vào GHCR trên VPS để có thể Tải Image về (nếu repo Private)
            echo ${{ secrets.GITHUB_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Di chuyển vào thư mục chứa docker-compose.yml
            cd services/Rental-Listing-Platform

            # Tải image mới nhất mà GitHub Actions vừa nén xong về VPS
            docker pull ghcr.io/$OWNER_LC/rental-backend:latest
            docker pull ghcr.io/$OWNER_LC/rental-frontend:latest
            
            # Đổi tên Image vừa tải về thành tên Local để nối đúng với file compose
            docker tag ghcr.io/$OWNER_LC/rental-backend:latest rental-listing-platform-backend:latest
            docker tag ghcr.io/$OWNER_LC/rental-frontend:latest rental-listing-platform-frontend:latest

            docker-compose up -d
            docker image prune -f
