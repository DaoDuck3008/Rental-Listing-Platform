version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rental_postgres
    restart: always
    environment:
      POSTGRES_DB: rental_db
      POSTGRES_USER: rental_user
      POSTGRES_PASSWORD: secret
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental_user -d rental_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: rental_redis
    restart: always
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass anhduc123
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "anhduc123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: rental_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    # Đọc các biến từ file .env hiện tại để giữ lại cấu hình (ví dụ: Cloudinary, JWT Secrets...)
    env_file:
      - ./apps/backend/.env
    # Ghi đè lại các biến quan trọng về Network để kết nối DB và Redis bên trong Docker
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rental_db
      DB_USER: rental_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: anhduc123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/
    container_name: rental_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
